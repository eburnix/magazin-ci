name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm Magazin-ci.spec
          Copy-Item README.md dist\README.md
          Copy-Item lancer-magazin-ci.bat dist\lancer-magazin-ci.bat

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ("${{ github.ref_type }}" -ne "tag") { $version = "1.1.2" }
          $env:MAGAZIN_CI_VERSION = $version
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" Magazin-ci-installer.iss
          Copy-Item installateur\Setup-Magazin-ci.exe Magazin-ci-Setup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magazin-ci-windows-installer
          path: Magazin-ci-Setup.exe

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Magazin-ci-Setup.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux package
        run: |
          ARGS=(--windowed --name "Magazin-ci")
          if [ -f "LOGO_.png" ]; then
            ARGS+=(--add-data "LOGO_.png:.")
          fi
          python -m PyInstaller "${ARGS[@]}" app.py
          cp README.md dist/Magazin-ci/README.md
          cd dist
          tar -czf Magazin-ci-linux.tar.gz Magazin-ci

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magazin-ci-linux
          path: dist/Magazin-ci-linux.tar.gz

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Magazin-ci-linux.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS package
        run: |
          ARGS=(--windowed --name "Magazin-ci")
          if [ -f "LOGO_.png" ]; then
            ARGS+=(--add-data "LOGO_.png:.")
          fi
          python -m PyInstaller "${ARGS[@]}" app.py
          cp README.md dist/Magazin-ci/README.md || true
          cd dist
          zip -r Magazin-ci-macOS.zip Magazin-ci

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magazin-ci-macos
          path: dist/Magazin-ci-macOS.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Magazin-ci-macOS.zip
